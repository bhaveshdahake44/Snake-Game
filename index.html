<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="infos" >
                <div class="info">
                    <h3>High Score:
                        <span id="high-score" >0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3>Score:
                        <span id="score" >0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3>Time:
                        <span id="time">00-00</span>
                    </h3>
                </div>
            </div>

            <div class="board" aria-label="Snake game board">
                
            </div>
            <div class="touch-controls" aria-label="Touch controls">
                <button class="control-btn control-up" type="button" data-direction="up" aria-label="Move up">↑</button>
                <button class="control-btn control-left" type="button" data-direction="left" aria-label="Move left">←</button>
                <button class="control-btn control-down" type="button" data-direction="down" aria-label="Move down">↓</button>
                <button class="control-btn control-right" type="button" data-direction="right" aria-label="Move right">→</button>
            </div>
        </section>
        <div class="modal">
            <div class="start-game">
                <h3>Wlcome to the snake Game</h3>
                <button class="btn btn-start" >Start Game</button>
            </div>
            <div class="game-over">
                <h3>Game Over</h3>
                <button class="btn btn-restart" >Restart Game</button>
            </div>
        </div>
    </main>
    
    <script src="script.js" ></script>
</body>
</html>
